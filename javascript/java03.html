<!DOCTYPE html>
<html>
<head>
    <title>.: javascript 03 :.</title>
    <script>
        function clickMe() {
            let firstNum = prompt("Enter 1st number : ");
            let secondNum = prompt("Enter 2nd number :");
            let sum = parseFloat(firstNum) + parseFloat(secondNum);
            
            // This grabs the div and injects the text inside it
            document.getElementById("result").innerText = "Answer is : " + sum;
        }
    </script>
</head>
<body>

    <button onclick="clickMe()">Click me to add 2 numbers</button>
    <div id="result">waiting for the answer</div>

</body>
</html>
