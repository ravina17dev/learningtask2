<!DOCTYPE html>
<html>
<head>
    <title>.: javascript 06 :.</title>

    <style type="text/css">
        .image-container {
            display: none;
        }
    </style>

    <script>
        function setVisibility(value) {
            document.getElementById("weep").style.display = value;
            return false;
        }
    </script>
</head>
<body>

    <div class="image-container" id="weep">
        <img src="java_imgs/weep.png" width="40%" />
    </div>

    <a href="javascript:void(0)" onclick="return setVisibility('block')">
        show image
    </a>

    <a href="javascript:void(0)" onclick="return setVisibility('none')">
        hide image
    </a>

</body>
</html>
