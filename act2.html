                  <p>
                     :Ordered list are list that is in a particular order:
                  </p>

                  <ol>

                  <li>Vice President</li>
                  <li>Governor</li>
                  <li>Vice Governor</li>
                  <li> Mayor </li>
                  <li>Vice Mayor</li>
                  </ol>
                  <p>
                     :Unordered list are list that is NOT in a particular order:
                 </p>
                   <ul>
                  <li>Bananas</li>

                  <li>Apples</li>
                  <li> Strawberry </li>
                  </ul>
